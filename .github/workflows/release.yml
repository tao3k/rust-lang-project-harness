name: Release provider binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish assets to"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe: ""
          - os: macos-14
            target: aarch64-apple-darwin
            exe: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe: ".exe"
    env:
      BINARY: rs-harness
      EXE: ${{ matrix.exe }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      TARGET: ${{ matrix.target }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --features cli --bin "$BINARY"

      - name: Package provider binary
        shell: bash
        run: |
          set -euo pipefail
          rm -rf package
          mkdir -p package
          cp "target/release/${BINARY}${EXE}" "package/${BINARY}${EXE}"
          asset="${BINARY}-${TARGET}.tar.gz"
          tar -czf "$asset" -C package "${BINARY}${EXE}"
          python - "$asset" <<'PY'
          import hashlib
          import pathlib
          import sys

          asset = pathlib.Path(sys.argv[1])
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          pathlib.Path(f"{asset}.sha256").write_text(f"{digest}  {asset.name}\n")
          PY

      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --notes "Provider binary release $RELEASE_TAG" \
            || gh release view "$RELEASE_TAG" >/dev/null
          gh release upload "$RELEASE_TAG" "${BINARY}-${TARGET}.tar.gz" "${BINARY}-${TARGET}.tar.gz.sha256" --clobber
