name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Configure sccache backend
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${ACTIONS_CACHE_URL:-}" && -n "${ACTIONS_RUNTIME_TOKEN:-}" ]]; then
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SCCACHE_GHA_ENABLED=false" >> "$GITHUB_ENV"
            echo "SCCACHE_DIR=${{ github.workspace }}/.sccache" >> "$GITHUB_ENV"
          fi
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Restore sccache cache (fallback)
        if: ${{ env.SCCACHE_GHA_ENABLED != 'true' }}
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/.sccache/
          key: rust-harness-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', '.github/workflows/ci.yml') }}-${{ github.run_id }}
          restore-keys: |
            rust-harness-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', '.github/workflows/ci.yml') }}-
            rust-harness-sccache-${{ runner.os }}-${{ hashFiles('Cargo.toml', '.github/workflows/ci.yml') }}-
            rust-harness-sccache-${{ runner.os }}-

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: rust-harness-ci-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch cargo dependencies
        run: cargo fetch

      - name: Check formatting
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo fmt --all -- --check

      - name: Run tests
        shell: bash
        run: |
          skips=(
            --skip cli_rust_flow_drill_reduces_search_rounds_with_seeds_and_recipe_plan
            --skip cli_search_fzf_accepts_workspace_relative_scope_paths
            --skip cli_search_fzf_points_code_shaped_queries_to_explicit_query_api
            --skip cli_search_fzf_renders_fuzzy_frontier
            --skip cli_search_guide_renders_typed_reasoning_profiles
            --skip cli_search_owner_items_graph_prioritizes_symbol_code_frontier
            --skip cli_search_query_routes_code_shaped_use_through_native_syntax_facts
            --skip cli_search_views_render_rfc_line_protocol
            --skip public_large_codex_web_search_flow_connects_prime_to_workspace_symbol_axes
            --skip public_large_tokio_bytes_flow_connects_prime_to_dependency_api_and_docs_axes
            --skip search_lab_multi_pipe_dependency_flow_compresses_to_final_packet
          )
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            skips+=(
              --skip calls_catalog_packet_projects_native_call_captures
              --skip cli_ast_patch_scenarios_match_expected_trees_and_receipts
              --skip cli_query_hook_source_option_reads_worktree_index_and_head
              --skip inline_function_name_capture_uses_name_node_and_line_range
              --skip tree_sitter_query_any_eq_predicate_filters_capture_text
              --skip tree_sitter_query_any_match_predicate_filters_capture_text
              --skip tree_sitter_query_frontier_output_can_be_filtered_by_term
              --skip tree_sitter_query_json_projects_matches_and_native_enrichment
              --skip tree_sitter_query_match_predicate_filters_capture_text
              --skip tree_sitter_query_not_predicate_filters_capture_text
              --skip tree_sitter_query_predicate_filters_capture_text
              --skip tree_sitter_query_stdout_renders_capture_frontier_graph_without_code
              --skip tree_sitter_query_calls_catalog_projects_call_frontier
            )
          fi
          cargo test --workspace --all-targets --all-features -- "${skips[@]}"

      - name: Run query search microbench
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo bench --bench query_search_microbench

      - name: Run clippy
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run harness self-check
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo run --features cli --bin rs-harness -- .

      - name: Save sccache cache (fallback)
        if: ${{ always() && !cancelled() && env.SCCACHE_GHA_ENABLED != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v6
        with:
          path: ${{ github.workspace }}/.sccache/
          key: rust-harness-sccache-${{ runner.os }}-${{ github.job }}-${{ hashFiles('Cargo.toml', '.github/workflows/ci.yml') }}-${{ github.run_id }}

      - name: sccache summary
        if: ${{ always() }}
        shell: bash
        run: sccache --show-stats || true
